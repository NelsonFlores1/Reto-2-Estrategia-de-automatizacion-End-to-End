webdriver {
  driver = chrome
  autodownload = true
  wait.for.timeout = 10000
    timeouts {
      implicitlywait = 5000
    }
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
;       args = ["test-type", "no-sandbox", "ignore-certificate-errors", "start-maximized", "incognito"]
      args = ["test-type", "no-sandbox", "ignore-certificate-errors", "incognito"]
    }
  }
}

headless.mode = false
serenity.take.screenshots = FOR_FAILURES

environments {
  default {
    webdriver.base.url = "https://www.saucedemo.com/"
  }
}